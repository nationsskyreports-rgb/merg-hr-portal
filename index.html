<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  
  <title>MERGE HR Portal</title>
  <meta name="description" content="Employee Attendance & HR Management System" />
  <meta name="theme-color" content="#38BDF8" />
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MERGE HR" />
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #EEF5FF;
      color: #07101E;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #080E1C 0%, #14213D 100%);
    }
    .loading-logo {
      width: 84px;
      height: 84px;
      background: #38BDF8;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 6px 24px rgba(56,189,248,0.4);
    }
    .loading-text {
      color: #F0F6FF;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
    }
    .loading-sub {
      color: #6E8CAD;
      font-size: 12px;
      margin-top: 8px;
      letter-spacing: 2px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(56,189,248,0.2);
      border-top-color: #38BDF8;
      border-radius: 50%;
      margin-top: 24px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-screen">
      <div class="loading-logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="4" y="12" width="6" height="20" rx="2" fill="rgba(255,255,255,0.9)" />
          <rect x="15" y="18" width="6" height="14" rx="2" fill="rgba(255,255,255,0.55)" />
          <rect x="26" y="12" width="6" height="20" rx="2" fill="rgba(255,255,255,0.9)" />
        </svg>
      </div>
      <div class="loading-text">MERGE</div>
      <div class="loading-sub">HR PORTAL</div>
      <div class="spinner"></div>
    </div>
  </div>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Load our app -->
  <script type="text/babel" data-type="module">
    // App will be loaded here
    console.log('MERGE HR Portal - Loading...');
  </script>
  
  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
