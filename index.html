<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MERGE HR Portal</title>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="MERGE HR"/>
<link rel="apple-touch-icon" href="/merg-hr-portal/icon-192.png"/>  
<link rel="manifest" href="/merg-hr-portal/manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; -webkit-tap-highlight-color:transparent; }

/* ══════════════════════════════════════════
   DESIGN TOKENS — LIGHT
══════════════════════════════════════════ */
:root {
  --bg:          #f4f5f9;
  --surface:     #ffffff;
  --surface-2:   #f8f9fc;
  --surface-3:   #eef0f7;
  --glass:       rgba(255,255,255,0.85);

  --text:        #0d1117;
  --sub:         #5a6478;
  --muted:       #9ba5b7;

  --indigo:      #6366f1;
  --indigo-dim:  rgba(99,102,241,0.10);
  --indigo-mid:  rgba(99,102,241,0.20);
  --sky:         #0ea5e9;
  --sky-dim:     rgba(14,165,233,0.10);
  --green:       #10b981;
  --green-dim:   rgba(16,185,129,0.10);
  --red:         #ef4444;
  --red-dim:     rgba(239,68,68,0.10);
  --amber:       #f59e0b;
  --amber-dim:   rgba(245,158,11,0.10);
  --purple:      #a855f7;
  --purple-dim:  rgba(168,85,247,0.10);

  --border:      rgba(0,0,0,0.06);
  --border-mid:  rgba(0,0,0,0.10);
  --input-bg:    #f0f2f8;
  --shadow-xs:   0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md:   0 4px 20px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg:   0 8px 32px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
  --shadow-accent: 0 8px 24px rgba(99,102,241,0.28);
  --shadow-green:  0 8px 24px rgba(16,185,129,0.28);
  --shadow-red:    0 8px 24px rgba(239,68,68,0.25);

  --r-sm:  8px;
  --r-md:  12px;
  --r-lg:  16px;
  --r-xl:  20px;
  --r-2xl: 24px;
  --r-full: 9999px;

  --ease-out: cubic-bezier(0.16,1,0.3,1);
  --t-fast:   0.15s;
  --t-mid:    0.25s;

  /* nav */
  --nav-h: 72px;
}

/* ══════════════════════════════════════════
   DESIGN TOKENS — DARK
══════════════════════════════════════════ */
body.dark {
  --bg:        #090e1a;
  --surface:   #111827;
  --surface-2: #162032;
  --surface-3: #1c2d42;
  --glass:     rgba(17,24,39,0.90);

  --text:      #f0f4ff;
  --sub:       #8899b4;
  --muted:     #4a5770;

  --border:    rgba(255,255,255,0.06);
  --border-mid:rgba(255,255,255,0.10);
  --input-bg:  #162032;

  --shadow-xs: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

/* ══════════════════════════════════════════
   TYPOGRAPHY
══════════════════════════════════════════ */
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.5;
  transition: background var(--t-mid) var(--ease-out), color var(--t-mid) var(--ease-out);
}
.syne, h1,h2,h3,h4,h5 { font-family: 'DM Sans', sans-serif; }

/* ══════════════════════════════════════════
   LAYOUT SHELLS
══════════════════════════════════════════ */
#root { width:100%; height:100vh; display:flex; align-items:center; justify-content:center; }
#empApp, #hrApp { width:100%; height:100vh; display:none; }

/* ══════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════ */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:var(--r-full); }

/* ══════════════════════════════════════════
   SPINNER
══════════════════════════════════════════ */
.spinner {
  width:32px; height:32px;
  border:2.5px solid var(--indigo-dim);
  border-top-color:var(--indigo);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast {
  position:fixed; bottom:calc(var(--nav-h) + 16px); left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surface); color:var(--text);
  padding:12px 18px; border-radius:var(--r-lg);
  box-shadow:var(--shadow-lg); z-index:9999;
  opacity:0; pointer-events:none;
  transition:opacity var(--t-fast) var(--ease-out), transform var(--t-fast) var(--ease-out);
  font-size:13.5px; font-weight:500;
  max-width:min(320px,88vw);
  border:1px solid var(--border);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
.toast.success { border-left:3px solid var(--green); }
.toast.error   { border-left:3px solid var(--red); }
.toast.warning { border-left:3px solid var(--amber); }

/* ══════════════════════════════════════════
   BADGE
══════════════════════════════════════════ */
.badge {
  display:inline-flex; align-items:center;
  padding:3px 9px; border-radius:var(--r-full);
  font-size:10px; font-weight:700;
  letter-spacing:.5px; text-transform:uppercase;
  font-family:'DM Sans',sans-serif;
}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.primary-btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  background:var(--indigo); color:#fff; border:none;
  padding:12px 20px; border-radius:var(--r-md);
  font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:background var(--t-fast), transform var(--t-fast), box-shadow var(--t-fast);
  box-shadow:0 2px 8px rgba(99,102,241,.2);
}
.primary-btn:hover:not(:disabled) { background:#4f52e8; box-shadow:var(--shadow-accent); transform:translateY(-1px); }
.primary-btn:active:not(:disabled) { transform:translateY(0); }
.primary-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ══════════════════════════════════════════
   ATTENDANCE BUTTONS — redesigned
══════════════════════════════════════════ */
.att-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }

.att-btn {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; padding:16px 12px; border:none; border-radius:var(--r-xl);
  font-family:'DM Sans',sans-serif; cursor:pointer;
  transition:transform var(--t-fast) var(--ease-out), box-shadow var(--t-fast), opacity var(--t-fast);
  font-size:13px; font-weight:700; color:#fff;
}
.att-btn .att-btn-icon { font-size:24px; }
.att-btn:hover:not(:disabled) { transform:translateY(-3px); }
.att-btn:active:not(:disabled) { transform:translateY(0); }
.att-btn:disabled { opacity:.35; cursor:not-allowed; }
.att-btn.checkin  { background:linear-gradient(135deg,#10b981,#059669); box-shadow:var(--shadow-green); }
.att-btn.checkout { background:linear-gradient(135deg,#ef4444,#dc2626); box-shadow:var(--shadow-red); }

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:18px; margin-bottom:12px;
  box-shadow:var(--shadow-sm);
}
.card-sm {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px; margin-bottom:8px;
  box-shadow:var(--shadow-xs);
}

/* ══════════════════════════════════════════
   HERO CARD (Home Page)
══════════════════════════════════════════ */
.hero-card {
  border-radius:var(--r-2xl);
  padding:22px 20px 20px;
  margin-bottom:16px;
  position:relative; overflow:hidden;
  background:linear-gradient(135deg,#6366f1 0%,#4f46e5 50%,#7c3aed 100%);
  box-shadow:0 12px 40px rgba(99,102,241,.35);
  color:#fff;
}
.hero-card::before {
  content:'';
  position:absolute; top:-40px; right:-40px;
  width:160px; height:160px;
  border-radius:50%;
  background:rgba(255,255,255,.07);
}
.hero-card::after {
  content:'';
  position:absolute; bottom:-30px; left:-20px;
  width:120px; height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.05);
}

.hero-greeting { font-size:13px; font-weight:600; opacity:.8; margin-bottom:4px; letter-spacing:.3px; }
.hero-name { font-family:'DM Sans',sans-serif; font-size:22px; font-weight:800; line-height:1.2; margin-bottom:2px; }
.hero-role { font-size:12px; opacity:.7; margin-bottom:16px; }

.hero-time-row {
  display:flex; gap:10px; position:relative; z-index:1;
}
.hero-time-box {
  flex:1; background:rgba(255,255,255,.12);
  border-radius:var(--r-lg); padding:10px 12px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.15);
}
.hero-time-label { font-size:10px; font-weight:700; opacity:.7; text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px; }
.hero-time-val { font-size:18px; font-weight:800; font-family:'DM Sans',sans-serif; }

/* ══════════════════════════════════════════
   STATUS PILL
══════════════════════════════════════════ */
.status-pill {
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:var(--r-full);
  font-size:11px; font-weight:700; font-family:'DM Sans',sans-serif;
  margin-bottom:14px; text-transform:uppercase; letter-spacing:.4px;
}
.status-pill.active { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.2); }
.status-pill.inactive { background:var(--surface-3); color:var(--muted); border:1px solid var(--border); }
.status-pill.pending { background:rgba(245,158,11,.12); color:var(--amber); border:1px solid rgba(245,158,11,.2); }
.status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
.status-dot.pulse { animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ══════════════════════════════════════════
   QUICK ACTIONS — redesigned
══════════════════════════════════════════ */
.action-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }

.action-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:16px 12px;
  cursor:pointer; text-align:center;
  transition:transform var(--t-fast) var(--ease-out), box-shadow var(--t-fast), border-color var(--t-fast);
  box-shadow:var(--shadow-xs);
}
.action-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); border-color:var(--border-mid); }
.action-card:active { transform:translateY(0); }

.ac-icon {
  width:46px; height:46px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; margin:0 auto 8px;
}
.ac-label { font-size:11px; font-weight:700; color:var(--sub); font-family:'DM Sans',sans-serif; }

/* ══════════════════════════════════════════
   BOTTOM NAV — Manus style
══════════════════════════════════════════ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  height:var(--nav-h);
  background:var(--glass);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-around;
  padding:0 8px 8px;
  z-index:100;
}

.nav-item {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; padding:8px 16px; border-radius:var(--r-lg);
  cursor:pointer; border:none; background:transparent;
  font-family:'DM Sans',sans-serif;
  transition:all var(--t-fast) var(--ease-out);
  position:relative; min-width:56px;
}
.nav-item svg { width:22px; height:22px; stroke:var(--muted); stroke-width:1.8; fill:none; transition:stroke var(--t-fast); }
.nav-item .nav-label { font-size:10px; font-weight:600; color:var(--muted); transition:color var(--t-fast); white-space:nowrap; }
.nav-item.active svg { stroke:var(--indigo); }
.nav-item.active .nav-label { color:var(--indigo); }
.nav-item.active::before {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:32px; height:3px; background:var(--indigo);
  border-radius:0 0 var(--r-full) var(--r-full);
}

.nav-badge {
  position:absolute; top:6px; right:8px;
  width:16px; height:16px; background:var(--red); color:#fff;
  border-radius:50%; font-size:9px; font-weight:800;
  display:none; align-items:center; justify-content:center;
  border:2px solid var(--bg);
}
.nav-badge.show { display:flex; }

/* ══════════════════════════════════════════
   EMP APP LAYOUT
══════════════════════════════════════════ */
.emp-header {
  position:fixed; top:0; left:0; right:0; z-index:50;
  height:56px;
  background:var(--glass);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
}
.emp-content {
  padding-top:72px; padding-bottom:calc(var(--nav-h) + 16px);
  padding-left:16px; padding-right:16px;
  overflow-y:auto; height:100vh;
}

/* ══════════════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════════════ */
.form-field { margin-bottom:14px; }
.field-label {
  display:block; font-size:11px; font-weight:700; color:var(--muted);
  margin-bottom:6px; text-transform:uppercase; letter-spacing:.7px;
  font-family:'DM Sans',sans-serif;
}
.form-input {
  width:100%; padding:11px 14px;
  background:var(--input-bg); border:1.5px solid var(--border);
  border-radius:var(--r-md); font-size:14px; color:var(--text);
  font-family:'DM Sans',sans-serif; outline:none;
  transition:border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
  -webkit-appearance:none;
}
.form-input:focus { border-color:var(--indigo); box-shadow:0 0 0 3px var(--indigo-dim); background:var(--surface); }
.form-input::placeholder { color:var(--muted); }

/* ══════════════════════════════════════════
   TABS (leave page)
══════════════════════════════════════════ */
.tab-bar {
  display:flex; gap:4px; margin-bottom:16px;
  background:var(--surface-3); border-radius:var(--r-lg);
  padding:4px;
}
.tab-btn {
  flex:1; background:transparent; border:none;
  padding:9px 14px; font-size:13px; font-weight:600;
  color:var(--muted); cursor:pointer; border-radius:var(--r-md);
  transition:all var(--t-fast) var(--ease-out);
  font-family:'DM Sans',sans-serif; white-space:nowrap;
}
.tab-btn.active { background:var(--surface); color:var(--indigo); box-shadow:var(--shadow-xs); font-weight:700; }

/* ══════════════════════════════════════════
   HR SIDEBAR (unchanged logic, better style)
══════════════════════════════════════════ */
.hr-tab {
  width:100%; display:flex; flex-direction:column; align-items:center;
  gap:4px; padding:12px 8px; margin-bottom:4px; border-radius:10px;
  font-size:11px; text-align:center; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-weight:600; color:var(--muted);
  background:transparent; transition:all var(--t-fast) var(--ease-out); outline:none;
}
.hr-tab:hover { background:var(--indigo-dim); color:var(--indigo); }
.hr-tab.active { background:var(--indigo-dim); color:var(--indigo); font-weight:800; outline:1.5px solid var(--indigo-mid); }

/* ══════════════════════════════════════════
   CHIPS
══════════════════════════════════════════ */
.chip {
  display:inline-flex; align-items:center; padding:7px 13px;
  background:var(--surface-3); border:1.5px solid var(--border);
  border-radius:var(--r-full); font-size:13px; font-weight:600;
  color:var(--sub); cursor:pointer;
  transition:all var(--t-fast) var(--ease-out);
  user-select:none;
}
.chip:hover { border-color:var(--indigo); color:var(--indigo); }
.chip.active { background:var(--indigo); color:#fff; border-color:var(--indigo); box-shadow:0 4px 12px rgba(99,102,241,.3); }
.chip-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }

/* ══════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════ */
.empty { text-align:center; padding:48px 24px; }
.empty-icon { font-size:48px; margin-bottom:12px; display:block; }
.empty-title { font-size:16px; font-weight:700; color:var(--text); margin-bottom:6px; font-family:'DM Sans',sans-serif; }
.empty-sub { font-size:13px; color:var(--muted); line-height:1.6; }

/* ══════════════════════════════════════════
   HISTORY ITEMS
══════════════════════════════════════════ */
.hist-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px 16px; margin-bottom:8px;
  box-shadow:var(--shadow-xs);
}
.hist-times { display:flex; align-items:center; gap:14px; }
.hist-time-label { font-size:10px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.6px; font-family:'DM Sans',sans-serif; }
.hist-time-val { font-size:16px; font-weight:700; color:var(--text); font-family:'DM Sans',sans-serif; }
.hist-divider { width:1px; height:36px; background:var(--border); flex-shrink:0; }

/* ══════════════════════════════════════════
   LEAVE CARDS
══════════════════════════════════════════ */
.leave-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px 16px; margin-bottom:8px;
  box-shadow:var(--shadow-xs);
}

/* ══════════════════════════════════════════
   NOTIFICATIONS
══════════════════════════════════════════ */
.notif-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px; margin-bottom:8px;
  display:flex; gap:12px; cursor:pointer;
  transition:border-color var(--t-fast), transform var(--t-fast);
  box-shadow:var(--shadow-xs);
}
.notif-item:hover { border-color:var(--indigo); transform:translateX(2px); }
.notif-unread { background:rgba(99,102,241,.03); border-color:rgba(99,102,241,.15); }
.notif-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--indigo); flex-shrink:0; margin-top:6px;
  box-shadow:0 0 0 3px var(--indigo-dim);
}

/* ══════════════════════════════════════════
   PROFILE — redesigned
══════════════════════════════════════════ */
.profile-hero {
  border-radius:var(--r-2xl); padding:28px 20px 24px;
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
  text-align:center; margin-bottom:16px; position:relative; overflow:hidden;
  box-shadow:0 12px 40px rgba(99,102,241,.25);
}
.profile-hero::before {
  content:''; position:absolute; top:-50px; right:-30px;
  width:150px; height:150px; border-radius:50%;
  background:rgba(255,255,255,.07);
}
.avatar-big {
  width:80px; height:80px; border-radius:50%;
  background:rgba(255,255,255,.2);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:28px; font-weight:800; margin:0 auto 12px;
  font-family:'DM Sans',sans-serif;
  border:3px solid rgba(255,255,255,.4);
  position:relative; z-index:1;
}
.profile-name { font-family:'DM Sans',sans-serif; font-size:20px; font-weight:800; color:#fff; margin-bottom:4px; }
.profile-role { font-size:12px; color:rgba(255,255,255,.75); }

.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.stat-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:14px 10px; text-align:center;
  box-shadow:var(--shadow-xs);
}
.stat-val { font-size:24px; font-weight:800; line-height:1; font-family:'DM Sans',sans-serif; }
.stat-label { font-size:10px; color:var(--muted); margin-top:5px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }

.info-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 0; border-bottom:1px solid var(--border);
}
.info-row:last-child { border-bottom:none; }
.info-label { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.5px; font-family:'DM Sans',sans-serif; }
.info-val { font-size:14px; color:var(--text); font-weight:600; }

.setting-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 16px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-lg); margin-bottom:8px; box-shadow:var(--shadow-xs);
  cursor:pointer; transition:border-color var(--t-fast);
}
.setting-row:hover { border-color:var(--border-mid); }

/* ══════════════════════════════════════════
   TOGGLE
══════════════════════════════════════════ */
.toggle {
  width:46px; height:26px; background:var(--surface-3);
  border:1.5px solid var(--border); border-radius:var(--r-full);
  cursor:pointer; position:relative;
  transition:background var(--t-mid) var(--ease-out), border-color var(--t-mid);
  flex-shrink:0;
}
.toggle.on { background:var(--green); border-color:var(--green); }
.toggle-thumb {
  width:20px; height:20px; background:#fff; border-radius:50%;
  position:absolute; left:2px; top:2px;
  transition:left var(--t-mid) var(--ease-out);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on .toggle-thumb { left:22px; }

/* ══════════════════════════════════════════
   HR STATS
══════════════════════════════════════════ */
.hr-stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
.hr-stat {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--r-xl); padding:18px 14px; text-align:center;
  box-shadow:var(--shadow-sm); transition:transform var(--t-fast), box-shadow var(--t-fast);
}
.hr-stat:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.hr-stat-icon { width:48px; height:48px; border-radius:var(--r-lg); display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 10px; }
.hr-stat-val { font-size:28px; font-weight:800; line-height:1; font-family:'DM Sans',sans-serif; letter-spacing:-1px; }
.hr-stat-label { font-size:11px; color:var(--muted); margin-top:6px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; font-family:'DM Sans',sans-serif; }

/* ══════════════════════════════════════════
   DAYS PILL
══════════════════════════════════════════ */
.days-pill {
  background:var(--indigo-dim); border:1px solid var(--indigo-mid);
  border-radius:var(--r-full); padding:7px 14px;
  display:inline-flex; align-items:center; gap:5px; margin-bottom:12px;
}
.days-pill-val { font-size:13px; font-weight:700; color:var(--indigo); font-family:'DM Sans',sans-serif; }

/* ══════════════════════════════════════════
   SECTION TITLE
══════════════════════════════════════════ */
.sec-title {
  font-size:11px; font-weight:800; color:var(--muted);
  margin-bottom:10px; margin-top:20px;
  text-transform:uppercase; letter-spacing:.9px; font-family:'DM Sans',sans-serif;
}

/* ══════════════════════════════════════════
   MODALS
══════════════════════════════════════════ */
#forgotPwModal,#changePwModal,#addEmpModal,#confirmModal {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px); z-index:1000;
  align-items:center; justify-content:center; padding:16px;
}

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
@keyframes scaleIn { from{transform:scale(.94);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes pageFade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.page-enter { animation:pageFade var(--t-mid) var(--ease-out); }

/* ══════════════════════════════════════════
   RTL
══════════════════════════════════════════ */
[dir="rtl"] .notif-item:hover { transform:translateX(-2px); }
[dir="rtl"] .toggle-thumb { left:auto; right:2px; }
[dir="rtl"] .toggle.on .toggle-thumb { left:auto; right:22px; }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width:360px) {
  .hero-name { font-size:18px; }
  .action-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat-val { font-size:20px; }
}

:focus-visible { outline:2.5px solid var(--indigo); outline-offset:2px; border-radius:var(--r-sm); }
button:focus:not(:focus-visible) { outline:none; }

/* dark-row alias */
.dark-row { }
</style>
</head>
<body>
<div id="root"></div>
<div id="empApp"></div>
<div id="hrApp"></div>
<div id="toast" class="toast"></div>

<!-- Modal: Forgot Password -->
<div id="forgotPwModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:var(--r-2xl);padding:28px 24px;width:90%;max-width:400px;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:scaleIn .25s cubic-bezier(0.16,1,0.3,1)">
    <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;font-family:'DM Sans',sans-serif" id="fm_title">Reset Password</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5" id="fm_sub">Enter your email to receive a reset link.</div>
    <div class="form-field">
      <label class="field-label" id="fm_label">Email</label>
      <input class="form-input" type="email" id="fm_email" placeholder="name@company.com"/>
    </div>
    <button class="primary-btn" onclick="handleForgotPw()" style="width:100%;margin-bottom:10px" id="resetBtnTxt">Send Reset Link</button>
    <button class="primary-btn" style="width:100%;background:var(--surface-3);color:var(--sub);box-shadow:none;border:1px solid var(--border)" onclick="closeModal('forgotPwModal')">Cancel</button>
  </div>
</div>

<!-- Modal: Change Password -->
<div id="changePwModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:var(--r-2xl);padding:28px 24px;width:90%;max-width:400px;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:scaleIn .25s cubic-bezier(0.16,1,0.3,1)">
    <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:20px;font-family:'DM Sans',sans-serif" id="cpTitle">Change Password</div>
    <div class="form-field"><label class="field-label">Current Password</label><input class="form-input" type="password" id="cp_current"/></div>
    <div class="form-field"><label class="field-label">New Password</label><input class="form-input" type="password" id="cp_new"/></div>
    <div class="form-field"><label class="field-label">Confirm Password</label><input class="form-input" type="password" id="cp_confirm"/></div>
    <button class="primary-btn" onclick="handleChangePw()" style="width:100%;margin-bottom:10px" id="cpBtn">Update Password</button>
    <button class="primary-btn" style="width:100%;background:var(--surface-3);color:var(--sub);box-shadow:none;border:1px solid var(--border)" onclick="closeModal('changePwModal')">Cancel</button>
  </div>
</div>

<!-- Modal: Add Employee -->
<div id="addEmpModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:var(--r-2xl);padding:28px 24px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:scaleIn .25s cubic-bezier(0.16,1,0.3,1)">
    <div style="font-size:20px;font-weight:800;color:var(--text);margin-bottom:20px;font-family:'DM Sans',sans-serif" id="addEmpTitle">Add Employee</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-field"><label class="field-label">First Name</label><input class="form-input" type="text" id="ae_first"/></div>
      <div class="form-field"><label class="field-label">Last Name</label><input class="form-input" type="text" id="ae_last"/></div>
      <div class="form-field" style="grid-column:1/-1"><label class="field-label">Email</label><input class="form-input" type="email" id="ae_email"/></div>
  <div class="form-field" style="margin:0">
    <label class="field-label">${lang==='ar'?'المنصب':'Position'}</label>
    <div style="display:flex;gap:8px">
      <select id="ae_pos_select" class="form-input" style="flex:1">
        <option value="">${lang==='ar'?'اختر المنصب':'Select Position'}</option>
        <!-- Options will be loaded here -->
      </select>
      <button onclick="openOptionModal('pos')" style="width:40px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--input-bg);cursor:pointer;font-size:18px">+</button>
    </div>
  </div>
  
  <!-- حقل القسم (Department) بقائمة ذكية -->
  <div class="form-field" style="margin:0">
    <label class="field-label">${lang==='ar'?'القسم':'Department'}</label>
    <div style="display:flex;gap:8px">
      <select id="ae_dept_select" class="form-input" style="flex:1">
        <option value="">${lang==='ar'?'اختر القسم':'Select Department'}</option>
        <!-- Options will be loaded here -->
      </select>
      <button onclick="openOptionModal('dept')" style="width:40px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--input-bg);cursor:pointer;font-size:18px">+</button>
    </div>
  </div>
       <div class="form-field"><label class="field-label">Phone</label><input class="form-input" type="tel" id="ae_phone"/></div>
      <div class="form-field"><label class="field-label">Hire Date</label><input class="form-input" type="date" id="ae_hire"/></div>
    </div>
    <button class="primary-btn" onclick="handleSaveEmployee()" style="width:100%;margin-bottom:10px;margin-top:6px" id="saveEmpBtn">Add Employee</button>
    <button class="primary-btn" style="width:100%;background:var(--surface-3);color:var(--sub);box-shadow:none;border:1px solid var(--border)" onclick="closeModal('addEmpModal')">Cancel</button>
  </div>
</div>

<!-- Modal: Confirm -->
<div id="confirmModal" onclick="if(event.target===this)closeModal('confirmModal')" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:2000;align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--surface);border-radius:var(--r-2xl);padding:28px 24px;width:90%;max-width:380px;border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:scaleIn .25s cubic-bezier(0.16,1,0.3,1)">
    <div style="font-size:24px;text-align:center;margin-bottom:12px" id="confirmIcon">⚠️</div>
    <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:8px;font-family:'DM Sans',sans-serif;text-align:center" id="confirmTitle"></div>
    <div style="font-size:14px;color:var(--sub);margin-bottom:24px;line-height:1.6;text-align:center" id="confirmMsg"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button class="primary-btn" style="background:var(--surface-3);color:var(--sub);box-shadow:none;border:1px solid var(--border)" onclick="closeModal('confirmModal')" id="confirmCancelBtn"></button>
      <button class="primary-btn" id="confirmOkBtn"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
</body>
</html>
