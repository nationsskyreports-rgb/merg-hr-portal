<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>MERGE HR Portal</title>
<meta name="theme-color" content="#38BDF8"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="MERGE HR"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --sky:#38BDF8;--sky2:#0284C7;--green:#22C55E;--red:#EF4444;--amber:#F59E0B;
  --purple:#A855F7;--indigo:#6366F1;
  --bg:#EEF5FF;--card:#fff;--border:#D1E0F0;--surface:#E3EDF8;
  --text:#07101E;--sub:#506A84;--muted:#8FA8C0;--input:#F5FAFF;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.dark{
  --bg:#080E1C;--card:#0F1A2E;--border:#1C2E47;--surface:#14213D;
  --text:#F0F6FF;--sub:#6E8CAD;--muted:#3E5470;--input:#060B16;
}

.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{background:#fff;align-items:center;justify-content:center;padding:28px;position:relative;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;pointer-events:none}
.blob1{top:-80px;right:-50px;width:280px;height:280px;background:rgba(56,189,248,.07)}
.blob2{bottom:-100px;left:-60px;width:320px;height:320px;background:rgba(34,197,94,.05)}
.login-box{width:100%;max-width:420px;z-index:1}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-img{width:130px;height:auto;margin-bottom:10px;border-radius:20px;box-shadow:0 8px 28px rgba(56,189,248,.25)}
.logo-fallback{width:80px;height:80px;background:var(--sky);border-radius:22px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(56,189,248,.38);margin-bottom:14px}
.logo-fallback svg{width:38px;height:38px}
.logo-name{font-size:26px;font-weight:800;letter-spacing:5px;color:#07101E}
.logo-sub{font-size:11px;color:#64748B;letter-spacing:3px;margin-top:3px}
.login-title{font-size:24px;font-weight:800;color:#07101E;margin-bottom:5px}
.login-sub{font-size:14px;color:#64748B;margin-bottom:26px;line-height:1.6}
.field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:#475569;margin-bottom:7px;display:block}
.field-wrap{display:flex;align-items:center;height:54px;background:#F7FAFF;border-radius:14px;padding:0 16px;border:1.5px solid #E2EAF4;transition:border-color .2s;margin-bottom:14px}
.field-wrap:focus-within{border-color:var(--sky)}
.field-wrap input{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-weight:500;color:#07101E;font-family:inherit}
.field-wrap input::placeholder{color:#9BB0C8}
.pw-eye{cursor:pointer;font-size:18px;padding:4px;color:#9BB0C8;background:none;border:none}
.forgot-btn{background:none;border:none;color:var(--sky2);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:22px;padding:3px 0;font-family:inherit}
.primary-btn{width:100%;height:54px;background:var(--sky);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 22px rgba(56,189,248,.3);transition:transform .15s,opacity .15s}
.primary-btn:hover{transform:translateY(-1px)}
.primary-btn:disabled{opacity:.65;cursor:not-allowed;transform:none}
.login-footer{text-align:center;color:#CBD5E1;font-size:11px;margin-top:24px;letter-spacing:1px}
.lang-toggle{position:absolute;top:20px;right:20px;z-index:10;background:rgba(2,132,199,.08);border:1px solid rgba(2,132,199,.18);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--sky2);font-weight:700;font-family:inherit}
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;max-width:90vw;text-align:center;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.error{background:#EF4444}
#toast.success{background:#22C55E}

/* APP HEADER */
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.header-logo{display:flex;align-items:center;gap:9px}
.header-logo-icon{width:34px;height:34px;background:var(--sky);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(56,189,248,.3);overflow:hidden}
.header-logo-icon img{width:34px;height:34px;object-fit:cover}
.header-logo-icon svg{width:16px;height:16px}
.header-logo-text{font-size:16px;font-weight:800;letter-spacing:2px;color:var(--text)}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:18px}
.notif-badge{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}

/* NAV */
.bottom-nav{background:var(--card);border-top:1px solid var(--border);display:flex;position:sticky;bottom:0;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;gap:3px;border:none;background:none;font-family:inherit}
.nav-item span{font-size:10px;font-weight:600;color:var(--muted)}
.nav-item.active span{color:var(--sky)}
.nav-item .nav-icon{font-size:20px}

/* CONTENT */
.app-content{flex:1;overflow-y:auto;background:var(--bg);padding:16px;padding-bottom:80px}

/* CARDS */
.card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card-sm{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.4px}

/* STAT BOXES */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:800;margin-bottom:3px}
.stat-label{font-size:10px;color:var(--sub);font-weight:600;letter-spacing:.3px}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--sub);margin-bottom:10px}

/* ACTION GRID */
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.action-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;font-family:inherit;transition:transform .15s}
.action-card:hover{transform:translateY(-1px)}
.action-card .ac-icon{font-size:24px}
.action-card .ac-label{font-size:10px;font-weight:700;text-align:center;letter-spacing:.3px}

/* ATTENDANCE CARD */
.att-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:18px;margin-bottom:16px}
.att-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.att-btn{height:50px;border-radius:13px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.att-btn:disabled{opacity:.4;cursor:not-allowed}

/* PROFILE */
.profile-header{background:var(--card);border-bottom:1px solid var(--border);padding:28px 20px;text-align:center;margin-bottom:14px}
.avatar-big{width:90px;height:90px;border-radius:45px;background:var(--sky);display:inline-flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;box-shadow:0 8px 24px rgba(56,189,248,.3);margin-bottom:12px}
.info-row{display:flex;padding:13px 4px;border-bottom:1px solid var(--border)}
.info-label{width:110px;font-size:13px;color:var(--sub);font-weight:500}
.info-val{flex:1;font-size:14px;font-weight:600;color:var(--text)}

/* FORM */
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--sub);margin-bottom:8px}
.form-input{width:100%;height:52px;background:var(--input);border:1.5px solid var(--border);border-radius:13px;padding:0 14px;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--sky)}
textarea.form-input{height:100px;padding:12px 14px;resize:none;line-height:1.6}
.form-select{width:100%;height:52px;background:var(--input);border:1.5px solid var(--border);border-radius:13px;padding:0 14px;font-size:14px;font-weight:500;color:var(--text);font-family:inherit;outline:none;appearance:none;cursor:pointer}

/* LEAVE TABS */
.tab-bar{display:flex;background:var(--surface);border-radius:13px;padding:4px;margin-bottom:14px;gap:4px}
.tab-btn{flex:1;padding:10px;border-radius:10px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--card);color:var(--sky);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* HR DASHBOARD */
.hr-tabs{display:flex;overflow-x:auto;gap:6px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);scrollbar-width:none}
.hr-tabs::-webkit-scrollbar{display:none}
.hr-tab{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .2s}
.hr-tab.active{background:var(--sky);color:#fff;border-color:var(--sky)}
.hr-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.hr-stat{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:16px}
.hr-stat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.hr-stat-val{font-size:26px;font-weight:800;margin-bottom:2px}
.hr-stat-label{font-size:11px;color:var(--sub)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:22px;width:100%;max-width:420px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal-head{padding:22px 22px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:18px;font-weight:800;color:var(--text)}
.modal-close{background:var(--surface);border:none;width:32px;height:32px;border-radius:16px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px 22px 22px}

/* DARK TOGGLE */
.dark-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.toggle{width:46px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:var(--sky)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on .toggle-thumb{left:23px}

/* HISTORY */
.hist-item{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid var(--border)}
.hist-times{display:grid;grid-template-columns:1fr 1px 1fr;gap:12px;margin-top:10px}
.hist-divider{background:var(--border)}
.hist-time-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--sub);margin-bottom:4px;letter-spacing:.4px}
.hist-time-val{font-size:18px;font-weight:800}

/* NOTIF */
.notif-item{background:var(--card);border-radius:16px;padding:15px;margin-bottom:10px;border:1px solid var(--border);display:flex;gap:10px}
.notif-dot{width:9px;height:9px;border-radius:50%;background:var(--sky);margin-top:5px;flex-shrink:0}
.notif-unread{border-color:rgba(56,189,248,.35)}

/* EMPLOYEE CARD */
.emp-card{background:var(--card);border-radius:16px;padding:14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.emp-avatar{width:44px;height:44px;border-radius:22px;background:rgba(56,189,248,.12);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--sky);flex-shrink:0;border:1px solid rgba(56,189,248,.2)}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--sub);line-height:1.6}

/* SEARCH */
.search-wrap{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:0 14px;margin-bottom:14px;gap:8px}
.search-wrap input{flex:1;height:46px;border:none;background:none;font-size:14px;color:var(--text);font-family:inherit;outline:none}
.search-wrap input::placeholder{color:var(--muted)}

/* CHIPS */
.chip-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;scrollbar-width:none;padding-bottom:2px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:9px 16px;border-radius:22px;border:1.5px solid var(--border);background:var(--card);font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
.chip.active{background:var(--sky);color:#fff;border-color:var(--sky)}

/* DAYS PILL */
.days-pill{background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.2);border-radius:13px;padding:12px;text-align:center;margin-bottom:14px}
.days-pill-val{font-size:18px;font-weight:800;color:var(--green)}

/* PASSWORD */
.pw-field-wrap{position:relative;margin-bottom:14px}
.pw-field-wrap input{padding-right:46px}
.pw-field-wrap .pw-toggle-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* LEAVE CARD */
.leave-card{background:var(--card);border-radius:16px;padding:15px;margin-bottom:10px;border:1px solid var(--border)}
.leave-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.leave-act-btn{padding:10px;border-radius:12px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}

/* EXPORT */
.exp-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.exp-type-btn{padding:14px 8px;border-radius:12px;border:1.5px solid var(--border);background:none;font-family:inherit;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;text-align:center}
.exp-type-btn.active{border-color:var(--sky);background:rgba(56,189,248,.08);color:var(--sky)}
.exp-type-btn .exp-icon{font-size:22px;margin-bottom:6px;display:block}

/* GREETING */
.greeting-name{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.greeting-date{font-size:12px;color:var(--sub);margin-top:3px}

/* NOTIF SEND */
.notif-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.notif-type-btn{padding:12px 8px;border-radius:12px;border:1.5px solid var(--border);background:none;font-family:inherit;cursor:pointer;text-align:center}
.notif-type-btn.active{border-color:var(--indigo);background:rgba(99,102,241,.08)}
.notif-type-btn .nt-icon{font-size:20px;margin-bottom:4px;display:block}
.notif-type-btn .nt-label{font-size:11px;font-weight:600;color:var(--sub)}
.notif-type-btn.active .nt-label{color:var(--indigo)}

@media(max-width:380px){
  .stat-val{font-size:20px}
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen" class="screen active">
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <button class="lang-toggle" onclick="toggleLang()">🌐 <span id="langBtnTxt">عربي</span></button>
  <div class="login-box">
    <div class="logo-wrap">
      <!-- Logo image — falls back to SVG if file not found -->
      <img src="assets/logo.png" alt="MERGE HR" class="logo-img"
           onerror="this.style.display='none';document.getElementById('logoFallback').style.display='inline-flex'"/>
      <div class="logo-fallback" id="logoFallback" style="display:none">
        <svg viewBox="0 0 38 38" fill="none"><rect x="6" y="10" width="6" height="20" rx="2.5" fill="rgba(255,255,255,.92)"/><rect x="16" y="16" width="6" height="14" rx="2.5" fill="rgba(255,255,255,.55)"/><rect x="26" y="10" width="6" height="20" rx="2.5" fill="rgba(255,255,255,.92)"/></svg>
      </div>
      <div class="logo-name">MERGE</div>
      <div class="logo-sub">HR PORTAL</div>
    </div>
    <div class="login-title" id="lt">Welcome Back</div>
    <div class="login-sub" id="ls">Sign in to your employee account</div>
    <div class="form-field">
      <label class="field-label" id="ll_email">Email Address</label>
      <div class="field-wrap"><input type="email" id="loginEmail" placeholder="name@company.com" autocomplete="email"/></div>
    </div>
    <div class="form-field">
      <label class="field-label" id="ll_pw">Password</label>
      <div class="field-wrap">
        <input type="password" id="loginPw" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-eye" onclick="togglePw('loginPw',this)">👁</button>
      </div>
    </div>
    <button class="forgot-btn" id="ll_forgot" onclick="openForgot()">Forgot Password?</button>
    <button class="primary-btn" id="loginBtn" onclick="handleLogin()">
      <span id="loginBtnTxt">Sign In</span>
    </button>
    <div class="login-footer">MERGE HR PORTAL v3.0</div>
  </div>
</div>

<!-- ═══ EMPLOYEE APP ═══ -->
<div id="empApp" class="screen">
  <div class="app-header">
    <div class="header-logo">
      <div class="header-logo-icon">
        <img src="icon-192.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
        <svg viewBox="0 0 38 38" fill="none" style="display:none"><rect x="6" y="10" width="6" height="20" rx="2.5" fill="rgba(255,255,255,.92)"/><rect x="16" y="16" width="6" height="14" rx="2.5" fill="rgba(255,255,255,.55)"/><rect x="26" y="10" width="6" height="20" rx="2.5" fill="rgba(255,255,255,.92)"/></svg>
      </div>
      <span class="header-logo-text">MERGE</span>
    </div>
    <div class="header-right">
      <button class="lang-toggle" style="position:static" onclick="toggleLang()">🌐 <span id="appLangBtn">عربي</span></button>
      <div class="icon-btn" onclick="showEmpTab('notifs')">🔔<span class="notif-badge" id="notifBadge" style="display:none">0</span></div>
    </div>
  </div>
  <div class="app-content" id="empContent"></div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="showEmpTab('home')" id="nav_home"><span class="nav-icon">🏠</span><span id="navt_home">Home</span></button>
    <button class="nav-item" onclick="showEmpTab('history')" id="nav_history"><span class="nav-icon">📊</span><span id="navt_history">History</span></button>
    <button class="nav-item" onclick="showEmpTab('leave')" id="nav_leave"><span class="nav-icon">🌴</span><span id="navt_leave">Leave</span></button>
    <button class="nav-item" onclick="showEmpTab('notifs')" id="nav_notifs"><span class="nav-icon">🔔</span><span id="navt_notifs">Notifs</span></button>
    <button class="nav-item" onclick="showEmpTab('profile')" id="nav_profile"><span class="nav-icon">👤</span><span id="navt_profile">Profile</span></button>

const haversine = (a,b,c,d) => {
  const R=6371000,r=x=>x*Math.PI/180,dl=r(c-a),dn=r(d-b);
  return R*2*Math.atan2(
    Math.sqrt(Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2),
    Math.sqrt(1-(Math.sin(dl/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dn/2)**2))
  );
};

// ═══ AUTH ═══
async function handleLogin() {
  const email = $('loginEmail').value.trim().toLowerCase();
  const pw = $('loginPw').value;
  if(!email) return toast(lang==='ar'?'الرجاء إدخال البريد':'Please enter email','error');
  if(!pw) return toast(lang==='ar'?'الرجاء إدخال كلمة المرور':'Please enter password','error');

  const btn = $('loginBtn'); btn.disabled = true;
  $('loginBtnTxt').innerHTML = '<div class="spinner"></div>';

  try {
    const {data:emp} = await sb.from('employees').select('id,status,first_name,last_name,email').eq('email',email).maybeSingle();
    if(!emp) { toast(lang==='ar'?'هذا البريد غير مسجل كموظف':'Email not registered as employee','error'); return; }
    if(emp.status!=='active') { toast(lang==='ar'?'حسابك غير نشط':'Account inactive','error'); return; }

    const {data:authData, error} = await sb.auth.signInWithPassword({email, password:pw});
    if(error) { toast(error.message,'error'); return; }

    currentUser = authData.user;
    const {data:fullEmp} = await sb.from('employees').select('*').eq('email',email).single();
    currentEmployee = fullEmp;
    isAdmin = email === 'admin@merge.com';
    if(isAdmin) { showScreen('hrApp'); initHR(); }
    else { showScreen('empApp'); initEmp(); }
  } catch(e) { toast(e.message,'error'); }
  finally { btn.disabled=false; $('loginBtnTxt').textContent=t().sign_in; }
}

async function handleLogout() {
  if(!confirm(lang==='ar'?'هل تريد تسجيل الخروج؟':'Logout?')) return;
  await sb.auth.signOut();
  currentUser=null; currentEmployee=null; isAdmin=false;
  showScreen('loginScreen');
  $('loginEmail').value=''; $('loginPw').value='';
}

function openForgot() { openModal('forgotModal'); }
async function handleReset() {
  const email = $('resetEmail').value.trim();
  if(!email) return toast('Enter email','error');
  const {error} = await sb.auth.resetPasswordForEmail(email);
  if(error) { toast(error.message,'error'); return; }
  toast(lang==='ar'?'تم إرسال الرابط على بريدك':'Reset link sent!','success');
  closeModal('forgotModal');
}

function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

async function handleCheckIn() {
  const btn = $('ciBtn'); if(btn) btn.disabled=true;
  try {
    if(!navigator.onLine) return toast(t().offline,'error');
    const {data:office} = await sb.from('office_location').select('*').eq('is_active',true).single();
    if(!office) return toast('Office location not configured','error');
    const loc = await new Promise((res,rej)=>{
      if(!navigator.geolocation) return rej(new Error('unavailable'));
      navigator.geolocation.getCurrentPosition(
        p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy||50}),
        ()=>rej(new Error(t().enable_gps)),
        {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
      );
    });
    const dist = haversine(loc.lat,loc.lng,office.latitude,office.longitude);
    const allowed = office.radius_meters + Math.min(loc.acc,50);
    if(dist>allowed) return toast(`${t().out_of_range}: ${dist.toFixed(0)}m. Max: ${office.radius_meters}m`,'error');
    const {data:ex} = await sb.from('attendance_records').select('id').eq('employee_id',currentEmployee.id).eq('attendance_date',nowISO()).maybeSingle();
    if(ex) return toast(t().already_in,'error');
    const {error} = await sb.from('attendance_records').insert([{employee_id:currentEmployee.id,attendance_date:nowISO(),check_in_time:nowTime(),office_id:office.id}]);
    if(error) return toast(error.message,'error');
    toast(`${t().checked_in} ${t().time_lbl}: ${fmtTime(nowTime())}. ${t().distance}: ${dist.toFixed(0)}m`,'success');
    renderEmp('home');
  } catch(e) { toast(e.message,'error'); if(btn) btn.disabled=false; }
}

async function handleCheckOut() {
  const btn = $('coBtn'); if(btn) btn.disabled=true;
  try {
    if(!navigator.onLine) return toast(t().offline,'error');
    const {data:rec} = await sb.from('attendance_records').select('*').eq('employee_id',currentEmployee.id).eq('attendance_date',nowISO()).maybeSingle();
    if(!rec) return toast(t().not_in,'error');
    if(rec.check_out_time) return toast(t().already_out,'error');
    const time = nowTime();
    const {error} = await sb.from('attendance_records').update({check_out_time:time}).eq('id',rec.id);
    if(error) return toast(error.message,'error');
    toast(`${t().checked_out} ${t().time_lbl}: ${fmtTime(time)}`,'success');
    renderEmp('home');
  } catch(e) { toast(e.message,'error'); if(btn) btn.disabled=false; }
}

function setLeaveTab(tab) { leaveTab=tab; renderLeave(); }
function setLeaveType(tp) { leaveType=tp; renderLeave(); }
function updateDays() {
  const s=$('lv_start')?.value, e=$('lv_end')?.value;
  if(!s||!e) return;
  const days=Math.ceil((new Date(e)-new Date(s))/86400000)+1;
  const pill=$('daysPill');
  if(pill&&days>0) pill.innerHTML=`<div class="days-pill"><div class="days-pill-val">📅 ${days} ${days>1?t().days:t().day}</div></div>`;
}

async function submitLeave() {
  const start=$('lv_start')?.value, end=$('lv_end')?.value, reason=$('lv_reason')?.value?.trim();
  if(!start||!end) return toast(t().missing_dates,'error');
  if(start<nowISO()) return toast(t().past_date,'error');
  if(end<start) return toast(t().invalid_dates,'error');
  if(!reason) return toast(t().missing_reason,'error');
  const days=Math.ceil((new Date(end)-new Date(start))/86400000)+1;
  const {error}=await sb.from('leave_requests').insert([{employee_id:currentEmployee.id,leave_type:leaveType,start_date:start,end_date:end,total_days:days,reason,status:'pending'}]);
  if(error) return toast(error.message,'error');
  toast(lang==='ar'?'تم إرسال الطلب ✅':'Request submitted ✅','success');
  leaveTab='history'; renderLeave();
}

async function renderHRLeaves() {
  const {data:leaves}=await sb.from('leave_requests').select('*,employees(first_name,last_name,department)').order('created_at',{ascending:false});
  const items=leaves||[];
  $('hrContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:18px;font-weight:800;color:var(--text)">${t().leaves_tab}</div>
      <span class="badge" style="background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)">${items.filter(l=>l.status==='pending').length} ${t().under_review}</span>
    </div>
    ${items.length===0
      ?`<div class="empty"><div class="empty-icon">🌴</div><div class="empty-title">${lang==='ar'?'لا توجد طلبات':'No leave requests'}</div></div>`

          <span class="badge" style="background:${statusColor(lv.status)}20;color:${statusColor(lv.status)};border:1px solid ${statusColor(lv.status)}30">${lv.status?.toUpperCase()}</span>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
          <span class="badge" style="background:rgba(99,102,241,.1);color:var(--indigo);border:1px solid rgba(99,102,241,.2)">${lv.leave_type}</span>
          <span class="badge" style="background:rgba(56,189,248,.1);color:var(--sky);border:1px solid rgba(56,189,248,.2)">${lv.total_days||0} ${t().days}</span>
        </div>
        <div style="font-size:12px;color:var(--sub);margin-bottom:6px">📅 ${lv.start_date} → ${lv.end_date}</div>
        ${lv.reason?`<div style="font-size:11px;color:var(--muted);margin-bottom:10px">💬 ${lv.reason}</div>`:''}

async function leaveAction(id, action) {
  await sb.from('leave_requests').update({status:action}).eq('id',id);
  toast(action==='approved'?(lang==='ar'?'تم القبول ✅':'Approved ✅'):(lang==='ar'?'تم الرفض':'Rejected'),'success');
  renderHRLeaves();
}

  const all=emps||[];

  $('hrContent').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:18px;font-weight:800;color:var(--text)">${t().employees_tab}</div>
      <button onclick="openModal('addEmpModal')" style="background:var(--sky);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">+ ${t().add_employee}</button>
    </div>
    <div class="search-wrap"><span>🔍</span><input placeholder="${t().search_emp}" value="${empSearch}" oninput="empSearch=this.value;renderHREmployees()"/></div>
    ${filtered.map(e=>`<div class="emp-card">

      <span class="badge" style="background:${e.status==='active'?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'};color:${e.status==='active'?'var(--green)':'var(--red)'};border:1px solid ${e.status==='active'?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'}">${e.status==='active'?t().active_st:t().inactive_st}</span>
    </div>`).join('')}

async function handleAddEmployee() {
  const fname=$('ae_fname').value.trim(), lname=$('ae_lname').value.trim();
  const email=$('ae_email').value.trim().toLowerCase(), pw=$('ae_pw').value;
  const dept=$('ae_dept').value.trim(), title=$('ae_title').value.trim(), phone=$('ae_phone').value.trim();
  if(!fname||!lname||!email||!pw) return toast('Fill all required fields','error');
  if(pw.length<6) return toast(t().pw_hint,'error');
  const btn=$('addEmpBtn'); btn.disabled=true; $('addEmpBtnTxt').innerHTML='<div class="spinner" style="margin:auto"></div>';
  try {
    const {data:authData,error:authErr}=await sb.auth.signUp({email,password:pw});
    if(authErr) return toast(authErr.message,'error');
    const code='MRG-'+String(Math.floor(Math.random()*900)+100);
    const {error:empErr}=await sb.from('employees').insert([{
      first_name:fname,last_name:lname,email,phone,department:dept,job_title:title,
      employee_code:code,status:'active',hire_date:nowISO(),
      role_id:'a0000000-0000-0000-0000-000000000003'
    }]);
    if(empErr) return toast(empErr.message,'error');
    toast(`${fname} ${lname} added! Code: ${code}`,'success');
    closeModal('addEmpModal');
    ['ae_fname','ae_lname','ae_email','ae_pw','ae_dept','ae_title','ae_phone'].forEach(id=>$(id)&&($(id).value=''));
    renderHREmployees();
  } catch(e) { toast(e.message,'error'); }
  finally { btn.disabled=false; $('addEmpBtnTxt').textContent=t().add_employee; }
}

let notifType='announcement', notifMsg='';
function renderHRNotifs() {
  $('hrContent').innerHTML=`
    <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px">${t().send_notif}</div>
    <div class="card">
      <div class="sec-title" style="margin-bottom:10px">${t().notif_type||'Type'}</div>
      <div class="notif-type-grid">
        ${[['announcement','📢',t().announcement],['reminder','⏰',t().reminder],['alert','🚨',t().alert]].map(([id,icon,label])=>`
          <button class="notif-type-btn ${notifType===id?'active':''}" onclick="notifType='${id}';renderHRNotifs()">
            <span class="nt-icon">${icon}</span><span class="nt-label">${label}</span>
          </button>`).join('')}

      <div class="sec-title" style="margin-bottom:8px">${t().notif_text}</div>

      <button class="primary-btn" style="margin-top:14px;background:var(--indigo);box-shadow:0 8px 22px rgba(99,102,241,.25)" onclick="sendNotifAll()">📤 ${t().send_all}</button>
    </div>
  `;

async function sendNotifAll() {
  const msg=$('notifMsgArea')?.value?.trim();
  if(!msg) return toast('Write a message first','error');
  const {data:emps}=await sb.from('employees').select('id').eq('status','active');
  if(!emps?.length) return toast('No active employees','error');
  const {error}=await sb.from('notifications').insert(emps.map(e=>({employee_id:e.id,type:notifType,message:msg,is_read:false})));
  if(error) return toast(error.message,'error');
  toast(lang==='ar'?'تم الإرسال للجميع ✅':'Sent to all employees ✅','success');
  notifMsg=''; renderHRNotifs();
}

let expType='attendance', expFrom='', expTo='';
function renderHRExport() {
  $('hrContent').innerHTML=`
    <div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px">📤 ${t().export_tab}</div>
    <div class="card">
      <div class="exp-type-grid">
        ${[['attendance','📍',t().attendance_tab],['employees','👥',t().employees_tab],['leaves','🌴',t().leaves_tab]].map(([id,icon,label])=>`
          <button class="exp-type-btn ${expType===id?'active':''}" onclick="expType='${id}';renderHRExport()">
            <span class="exp-icon">${icon}</span>${label}
          </button>`).join('')}
      </div>
      ${expType!=='employees'?`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
          <div class="form-field"><label class="field-label">${t().from_date}</label><input class="form-input" type="date" id="expFrom" value="${expFrom}" onchange="expFrom=this.value"/></div>
          <div class="form-field"><label class="field-label">${t().to_date}</label><input class="form-input" type="date" id="expTo" value="${expTo}" onchange="expTo=this.value"/></div>
        </div>`:''}
      <button class="primary-btn" onclick="doExport()">📥 ${t().generate_download}</button>
    </div>
  `;
}

async function doExport() {
  let rows=[], filename='export.csv', headers=[];
  if(expType==='attendance') {
    let q=sb.from('attendance_records').select('attendance_date,check_in_time,check_out_time,employees(first_name,last_name,employee_code,department)');
    if(expFrom) q=q.gte('attendance_date',expFrom);
    if(expTo)   q=q.lte('attendance_date',expTo);
    const {data}=await q.order('attendance_date',{ascending:false});
    headers=['Date','Employee','Code','Department','Check In','Check Out'];
    rows=(data||[]).map(r=>[r.attendance_date,`${r.employees?.first_name} ${r.employees?.last_name}`,r.employees?.employee_code,r.employees?.department,fmtTime(r.check_in_time),fmtTime(r.check_out_time)]);
    filename=`attendance_${nowISO()}.csv`;
  } else if(expType==='employees') {
    const {data}=await sb.from('employees').select('employee_code,first_name,last_name,email,department,job_title,status').order('employee_code');
    headers=['Code','Name','Email','Department','Position','Status'];
    rows=(data||[]).map(r=>[r.employee_code,`${r.first_name} ${r.last_name}`,r.email,r.department,r.job_title,r.status]);
    filename=`employees_${nowISO()}.csv`;
  } else {
    let q=sb.from('leave_requests').select('leave_type,start_date,end_date,total_days,reason,status,employees(first_name,last_name,department)');
    if(expFrom) q=q.gte('start_date',expFrom);
    if(expTo)   q=q.lte('start_date',expTo);
    const {data}=await q.order('created_at',{ascending:false});
    headers=['Employee','Department','Type','Start','End','Days','Reason','Status'];
    rows=(data||[]).map(r=>[`${r.employees?.first_name} ${r.employees?.last_name}`,r.employees?.department,r.leave_type,r.start_date,r.end_date,r.total_days,r.reason,r.status]);
    filename=`leaves_${nowISO()}.csv`;
  }
  if(!rows.length) return toast('No data found','error');
  const csv=[headers,...rows].map(r=>r.map(v=>`"${v||''}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded! ✅','success');
}

  applyDark();
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  updateLangBtns();
  updateStaticText();
  renderLogin();
  sb.auth.getSession().then(({data:{session}})=>{
    if(session) {
      currentUser=session.user;
      sb.from('employees').select('*').eq('email',session.user.email).single().then(({data:emp})=>{
        if(emp) {
          currentEmployee=emp;
          isAdmin=emp.email==='admin@merge.com';
          if(isAdmin) { showScreen('hrApp'); initHR(); }
          else { showScreen('empApp'); initEmp(); }
        }
      });
    }
  });
}
